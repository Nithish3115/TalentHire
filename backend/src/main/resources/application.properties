spring.application.name=job-fair-portal
server.port=8080

# PostgreSQL Database (persistent)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/jobfairdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:jobfair}
spring.datasource.password=${DB_PASSWORD:jobfair123}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable auto-seeding on each boot for persistent environments
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false

# JWT
jwt.secret=mySecretKeyForJobFairPortalMVP2024mySecretKeyForJobFairPortalMVP2024mySecretKeyForJobFairPortalMVP2024
jwt.expiration=86400000

# CORS
allowed.origins=http://localhost:5173,http://localhost:3000
